name: hungry_app
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.11.1

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.3.0
  flutter_gap: ^1.2.0
  auto_size_text: ^3.0.0
  flutter_animate: ^4.5.2
  get: ^4.7.3
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  flutter_secure_storage: ^10.3.1
  dio: ^5.10.0
  flutter_bloc: ^9.1.1
  get_it: ^9.2.1
  modal_progress_hud_nsn: ^0.5.1
  fpdart: ^1.2.0
  image_picker: ^1.2.3
  firebase_storage: ^13.4.3
  cloudinary_public: ^0.23.1
  cached_network_image: ^3.4.1
  # Migrated from hive/hive_flutter (unmaintained, blocked modern build_runner)
  # to Hive CE (Community Edition) — actively maintained fork.
  hive_ce: ^2.16.0
  hive_ce_flutter: ^2.3.3
  video_player: ^2.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0
  flutter_launcher_icons:
  flutter_gen_runner: ^5.10.0
  build_runner: ^2.15.1
  hive_ce_generator: ^1.11.1
flutter_gen:
  integrations:
    flutter_svg: true
    output: lib/core/generated/


flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/download.png"
  adaptive_icon_foreground: "assets/images/download.png"
  adaptive_icon_background: "#000000"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/Inter/
    - assets/fonts/Roboto/
    - lib/features/
    - lib/
    - lib/core/
    - lib/core/utils/
    - lib/features/home_feature/
    - lib/features/home_feature/presentation/
    - lib/features/home_feature/presentation/views/
    - lib/features/home_feature/presentation/views/widgets/
    - lib/features/product_details_feature/
    - lib/features/cart_feature/
    - lib/features/product_details_feature/presentation/views/widgets/
    - lib/features/profile_feature/presentation/views/widgets/
    - lib/features/aut_feature/domain/
    - lib/features/aut_feature/domain/repos/
    - lib/features/aut_feature/domain/entities/
    - lib/core/widgets/
    - lib/features/aut_feature/
    - lib/features/aut_feature/data/
    - lib/features/aut_feature/domain/use_cases/
    - lib/features/aut_feature/presentation/
    - lib/features/aut_feature/presentation/views/
    - lib/features/aut_feature/presentation/views/widgets/
    - lib/features/cart_feature/presentation/
    - lib/features/cart_feature/presentation/views/
    - lib/features/cart_feature/presentation/views/widgets/
    - lib/features/splash_feature/
    - lib/features/splash_feature/presentation/
    - lib/features/splash_feature/presentation/views/
    - lib/features/splash_feature/presentation/views/widgets/
    - lib/features/profile_feature/
    - lib/features/profile_feature/presentation/
    - lib/features/profile_feature/presentation/views/
    - lib/features/checkout_feature/
    - lib/features/checkout_feature/presentation/
    - lib/features/checkout_feature/presentation/views/
    - lib/features/checkout_feature/presentation/views/widgets/
    - lib/features/order_history_feature/
    - lib/features/order_history_feature/presentation/
    - lib/features/order_history_feature/presentation/views/
    - lib/features/order_history_feature/presentation/views/widgets/
    - lib/features/product_details_feature/presentation/
    - lib/features/product_details_feature/presentation/views/


  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter/Inter_18pt-Thin.ttf
          weight: 100

        - asset: assets/fonts/Inter/Inter_18pt-ExtraLight.ttf
          weight: 200

        - asset: assets/fonts/Inter/Inter_18pt-Light.ttf
          weight: 300

        - asset: assets/fonts/Inter/Inter_18pt-Regular.ttf
          weight: 400

        - asset: assets/fonts/Inter/Inter_18pt-Medium.ttf
          weight: 500

        - asset: assets/fonts/Inter/Inter_18pt-SemiBold.ttf
          weight: 600

        - asset: assets/fonts/Inter/Inter_18pt-Bold.ttf
          weight: 700

        - asset: assets/fonts/Inter/Inter_18pt-ExtraBold.ttf
          weight: 800

        - asset: assets/fonts/Inter/Inter_18pt-Black.ttf
          weight: 900

    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins/Poppins-Thin.ttf
          weight: 100

        - asset: assets/fonts/Poppins/Poppins-ExtraLight.ttf
          weight: 200

        - asset: assets/fonts/Poppins/Poppins-Light.ttf
          weight: 300

        - asset: assets/fonts/Poppins/Poppins-Regular.ttf
          weight: 400

        - asset: assets/fonts/Poppins/Poppins-Medium.ttf
          weight: 500

        - asset: assets/fonts/Poppins/Poppins-SemiBold.ttf
          weight: 600

        - asset: assets/fonts/Poppins/Poppins-Bold.ttf
          weight: 700

        - asset: assets/fonts/Poppins/Poppins-ExtraBold.ttf
          weight: 800

        - asset: assets/fonts/Poppins/Poppins-Black.ttf
          weight: 900

    - family: ReemKufiInk
      fonts:
        - asset: assets/fonts/Reem_Kufi_Ink/ReemKufiInk-Regular.ttf

    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto/Roboto-Thin.ttf
          weight: 100

        - asset: assets/fonts/Roboto/Roboto-ExtraLight.ttf
          weight: 200

        - asset: assets/fonts/Roboto/Roboto-Light.ttf
          weight: 300

        - asset: assets/fonts/Roboto/Roboto-Regular.ttf
          weight: 400

        - asset: assets/fonts/Roboto/Roboto-Medium.ttf
          weight: 500

        - asset: assets/fonts/Roboto/Roboto-SemiBold.ttf
          weight: 600

        - asset: assets/fonts/Roboto/Roboto-Bold.ttf
          weight: 700

        - asset: assets/fonts/Roboto/Roboto-ExtraBold.ttf
          weight: 800

        - asset: assets/fonts/Roboto/Roboto-Black.ttf
          weight: 900